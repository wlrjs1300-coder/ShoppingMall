<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>따뜻한 떡집 | 비밀번호 재설정</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="login-page">
    <header class="site-header" data-shared-header></header>
    <main class="auth-page">
      <section class="auth-card">
        <h1>새 비밀번호 설정</h1>
        <p class="auth-card-desc">새로 사용할 비밀번호를 입력해 주세요.</p>
        <form data-password-reset-confirm-form novalidate>
          <label>
            <span>새 비밀번호</span>
            <input type="password" name="password" autocomplete="new-password" minlength="8" required />
          </label>
          <label>
            <span>새 비밀번호 확인</span>
            <input type="password" name="passwordConfirm" autocomplete="new-password" minlength="8" required />
          </label>
          <button class="primary-button" type="submit">비밀번호 변경</button>
          <p class="auth-message" data-password-reset-confirm-message role="status" aria-live="polite"></p>
        </form>
        <p class="auth-switch"><a href="login.html">로그인으로 돌아가기</a></p>
      </section>
    </main>
    <script src="cart-utils.js"></script>
    <script src="js/ui.js"></script><script src="js/config.js"></script><script src="js/api.js"></script><script src="js/state.js"></script><script src="js/utils.js"></script><script src="js/components.js"></script><script src="js/home.js"></script><script src="js/search.js"></script><script src="js/cart.js"></script><script src="js/auth.js"></script>
  </body>
</html>
