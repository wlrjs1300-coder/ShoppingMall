<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>따뜻한 떡집 | 상품 문의</title>
    <meta name="description" content="상품 구성과 일정에 관한 문의를 남겨 주세요." />
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css?v=135" />
    <style>
      .inquiry-page .inquiry-product-field {
        position: relative;
        display: grid;
        gap: 8px;
      }

      .inquiry-page .inquiry-product-field > label {
        color: #4b353b;
        font-size: 13px;
        font-weight: 850;
      }

      .inquiry-page .inquiry-product-trigger {
        position: relative;
        width: 100%;
        min-height: 44px;
        padding: 0 42px 0 13px;
        border: 1px solid rgba(241, 215, 220, 0.95);
        border-radius: 8px;
        color: #3f2c31;
        background: #fffdfa;
        font: inherit;
        text-align: left;
        cursor: pointer;
        outline: none;
        box-shadow: none;
        transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
      }

      .inquiry-page .inquiry-product-trigger:hover,
      .inquiry-page .inquiry-product-trigger:focus-visible,
      .inquiry-page .inquiry-product-trigger[aria-expanded="true"] {
        border-color: var(--pink-deep);
        box-shadow: 0 0 0 4px rgba(223, 79, 109, 0.11);
      }

      .inquiry-page .inquiry-product-trigger:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .inquiry-page .inquiry-product-trigger::after {
        content: "";
        position: absolute;
        right: 19px;
        top: 50%;
        width: 8px;
        height: 8px;
        border-right: 2px solid #c44864;
        border-bottom: 2px solid #c44864;
        transform: translateY(-70%) rotate(45deg);
        transition: transform 160ms ease;
      }

      .inquiry-page .inquiry-product-trigger[aria-expanded="true"]::after {
        transform: translateY(-25%) rotate(225deg);
      }

      .inquiry-page .inquiry-product-trigger small,
      .inquiry-page .inquiry-product-trigger strong {
        display: block;
      }

      .inquiry-page .inquiry-product-trigger small {
        display: none;
      }

      .inquiry-page .inquiry-product-trigger strong {
        color: #3e2a30;
        font-size: 13px;
        line-height: 1.4;
        font-weight: 700;
      }

      .inquiry-page .inquiry-product-options {
        position: absolute;
        z-index: 20;
        top: calc(100% + 8px);
        right: 0;
        left: 0;
        display: grid;
        gap: 2px;
        max-height: 280px;
        margin: 0;
        padding: 8px;
        overflow-y: auto;
        border: 1px solid #ead4da;
        border-radius: 10px;
        background: #fffdfa;
        box-shadow: 0 14px 34px rgba(69, 37, 46, 0.12);
      }

      .inquiry-page .inquiry-product-options[hidden] { display: none; }

      .inquiry-page .inquiry-product-option {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 12px;
        width: 100%;
        min-height: 44px;
        padding: 7px 11px;
        border: 1px solid transparent;
        border-radius: 7px;
        color: #443137;
        background: transparent;
        font: inherit;
        text-align: left;
        cursor: pointer;
      }

      .inquiry-page .inquiry-product-option:hover,
      .inquiry-page .inquiry-product-option:focus-visible,
      .inquiry-page .inquiry-product-option.is-selected {
        border-color: #efcbd4;
        background: #fff7f9;
        outline: none;
      }

      .inquiry-page .inquiry-product-option span { min-width: 0; }
      .inquiry-page .inquiry-product-option small,
      .inquiry-page .inquiry-product-option strong { display: block; }
      .inquiry-page .inquiry-product-option small { margin-bottom: 2px; color: #9b7c84; font-size: 10px; font-weight: 700; }
      .inquiry-page .inquiry-product-option strong { overflow: hidden; font-size: 13px; font-weight: 750; text-overflow: ellipsis; white-space: nowrap; }
      .inquiry-page .inquiry-product-option b { color: var(--pink-deep); font-size: 13px; opacity: 0; }
      .inquiry-page .inquiry-product-option.is-selected b { opacity: 1; }

      .inquiry-page .inquiry-photo-field { display: grid; gap: 9px; }
      .inquiry-page .inquiry-photo-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
      .inquiry-page .inquiry-photo-head strong { color: #4b353b; font-size: 13px; font-weight: 850; }
      .inquiry-page .inquiry-photo-head small { color: #9a8086; font-size: 10px; }
      .inquiry-page .inquiry-photo-tools { display: flex; gap: 9px; min-width: 0; overflow-x: auto; }
      .inquiry-page .inquiry-photo-add,
      .inquiry-page .inquiry-photo-item { flex: 0 0 104px; width: 104px; height: 86px; }
      .inquiry-page .inquiry-photo-add { display: grid; place-items: center; align-content: center; gap: 4px; border: 1px dashed #dcaeba; border-radius: 10px; color: #bd405d; background: #fff7f9; box-sizing: border-box; cursor: pointer; }
      .inquiry-page .inquiry-photo-add b { font-size: 23px; line-height: 1; font-weight: 500; }
      .inquiry-page .inquiry-photo-add span { font-size: 11px; font-weight: 850; }
      .inquiry-page .inquiry-photo-add input { position: absolute; width: 1px; height: 1px; opacity: 0; }
      .inquiry-page .inquiry-photo-preview { display: flex; gap: 9px; }
      .inquiry-page .inquiry-photo-item { position: relative; }
      .inquiry-page .inquiry-photo-item img { width: 104px; height: 86px; border-radius: 10px; object-fit: cover; background: #f4e8eb; }
      .inquiry-page .inquiry-photo-item button { position: absolute; top: 5px; right: 5px; display: grid; place-items: center; width: 23px; height: 23px; padding: 0; border: 0; border-radius: 50%; color: #fff; background: rgba(50,31,36,.75); font-size: 15px; cursor: pointer; }

    </style>
  </head>
  <body class="inquiry-page">
    <header class="site-header" data-shared-header></header>
    <div class="event-ticker" aria-label="이벤트 안내" data-shared-ticker></div>
    <main class="auth-page">
      <section class="auth-card inquiry-card">
        <h1>상품 문의하기</h1>
        <p class="auth-card-desc">수량과 희망 일정을 알려주시면 확인 후 연락드리겠습니다.</p>
        <form data-inquiry-form novalidate>
          <div class="inquiry-product-field" data-product-picker>
            <label for="inquiry-product-trigger">문의 상품</label>
            <select class="sr-only" name="productId" required disabled tabindex="-1"><option value="">상품을 선택해 주세요.</option></select>
            <input type="hidden" name="productName" />
            <button id="inquiry-product-trigger" class="inquiry-product-trigger" type="button" aria-haspopup="listbox" aria-expanded="false" disabled data-product-trigger><small data-product-category>상품 선택</small><strong data-product-label>상품 목록을 불러오는 중입니다.</strong></button>
            <div class="inquiry-product-options" role="listbox" aria-label="문의 상품 선택" data-product-options hidden></div>
          </div>
          <label><span>이름</span><input type="text" name="customer" maxlength="50" autocomplete="name" required /></label>
          <label><span>연락처</span><input type="tel" name="phone" maxlength="13" autocomplete="tel" placeholder="010-0000-0000" required /></label>
          <div class="inquiry-field">
            <label for="inquiry-quantity">예상 수량</label>
            <div class="inquiry-quantity-control">
              <button type="button" data-quantity-step="-1" aria-label="수량 줄이기">−</button>
              <input id="inquiry-quantity" type="number" name="quantity" min="1" max="9999" value="10" inputmode="numeric" required />
              <button type="button" data-quantity-step="1" aria-label="수량 늘리기">＋</button>
            </div>
            <div class="inquiry-quick-options" aria-label="자주 선택하는 수량">
              <button type="button" data-quantity-value="10">10개</button>
              <button type="button" data-quantity-value="30">30개</button>
              <button type="button" data-quantity-value="50">50개</button>
              <button type="button" data-quantity-value="100">100개</button>
            </div>
          </div>
          <div class="inquiry-field">
            <label for="inquiry-date-display">희망 날짜 <small>선택</small></label>
            <div class="inquiry-date-picker" data-date-picker>
              <button id="inquiry-date-display" class="inquiry-date-trigger" type="button" aria-haspopup="dialog" aria-expanded="false" data-date-trigger>
                <span data-date-display>날짜를 선택해 주세요</span>
                <svg class="inquiry-date-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none">
                  <path d="M7 3v3M17 3v3M4.5 9h15M6 5h12a2 2 0 0 1 2 2v12H4V7a2 2 0 0 1 2-2Z" />
                  <path d="M8 13h2M14 13h2M8 16.5h2M14 16.5h2" />
                </svg>
              </button>
              <input type="hidden" name="desiredDate" />
              <div class="inquiry-calendar" role="dialog" aria-modal="false" aria-label="희망 날짜 선택" data-calendar hidden>
                <div class="inquiry-calendar-header">
                  <button type="button" aria-label="이전 달" data-calendar-prev>‹</button>
                  <strong data-calendar-title></strong>
                  <button type="button" aria-label="다음 달" data-calendar-next>›</button>
                </div>
                <div class="inquiry-calendar-weekdays" aria-hidden="true"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
                <div class="inquiry-calendar-days" data-calendar-days></div>
                <div class="inquiry-calendar-footer">
                  <button type="button" data-calendar-today>오늘</button>
                  <button type="button" data-date-clear>선택 지우기</button>
                </div>
              </div>
            </div>
            <div class="inquiry-quick-options" aria-label="빠른 날짜 선택">
              <button type="button" data-date-offset="3">3일 후</button>
              <button type="button" data-date-offset="7">1주 후</button>
              <button type="button" data-date-offset="14">2주 후</button>
            </div>
          </div>
          <label><span>문의 내용</span><textarea name="message" maxlength="1000" rows="5" placeholder="포장, 구성, 예산 등 궁금한 내용을 적어 주세요." required></textarea></label>
          <section class="inquiry-photo-field"><div class="inquiry-photo-head"><strong>사진 첨부 <small>(선택)</small></strong><small>최대 3장 · 장당 5MB 이하</small></div><div class="inquiry-photo-tools"><label class="inquiry-photo-add"><input type="file" accept="image/jpeg,image/png,image/webp" multiple data-inquiry-photo-input /><b aria-hidden="true">＋</b><span>사진 추가</span></label><div class="inquiry-photo-preview" data-inquiry-photo-preview></div></div></section>
          <label class="auth-agree"><input type="checkbox" name="agreePrivacy" required /><span><a href="privacy.html" target="_blank" rel="noopener">개인정보 처리방침</a>에 동의합니다. <strong>(필수)</strong></span></label>
          <button class="primary-button" type="submit">문의 접수하기</button>
          <p class="auth-message" data-inquiry-message role="status" aria-live="polite"></p>
        </form>
        <p class="auth-switch">이전에 남긴 문의가 있으신가요? <a href="inquiry-lookup.html">비회원 문의조회</a></p>
      </section>
    </main>
    <footer class="site-footer" data-shared-footer></footer>
    <script src="cart-utils.js"></script>
    <script src="js/ui.js"></script><script src="js/config.js"></script><script src="js/api.js"></script><script src="js/state.js"></script><script src="js/utils.js"></script><script src="js/components.js"></script><script src="js/search.js?v=2"></script><script src="js/inquiry.js?v=5"></script><script src="js/cart.js"></script><script src="js/auth.js"></script>
  </body>
</html>
