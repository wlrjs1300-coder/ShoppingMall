<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>따뜻한 떡집 | 메뉴</title>
    <meta name="description" content="따뜻한 떡집 메뉴. 송편, 절편, 인절미 등 수제 떡 메뉴와 가격을 확인하세요." />
    <meta name="theme-color" content="#fff3f7" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="따뜻한 떡집 | 메뉴" />
    <meta property="og:description" content="따뜻한 떡집 메뉴. 송편, 절편, 인절미 등 수제 떡 메뉴와 가격을 확인하세요." />
    <meta property="og:image" content="assets/tteok-hero.png" />
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/logo.svg" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="manifest" href="manifest.json" />
    <style>
      .menu-page .product-price-lines {
        display: flex;
        align-items: flex-start;
        gap: clamp(18px, 2vw, 30px);
        margin: 10px 0 0;
      }

      .menu-page .product-price-set {
        display: grid;
        grid-template-rows: auto auto;
        justify-items: start;
        align-content: start;
        row-gap: 3px;
        min-width: 0;
      }

      .menu-page .product-price-set .product-unit-label {
        color: #826b71;
        font-size: 12px;
        line-height: 1.4;
        font-weight: 750;
        letter-spacing: -0.015em;
        white-space: nowrap;
      }

      .menu-page .product-price-set .product-unit-price {
        display: block;
        margin: 0;
        color: var(--pink-deep);
        font-size: 16px;
        line-height: 1.3;
        font-weight: 900;
        letter-spacing: -0.025em;
        white-space: nowrap;
      }

      .menu-page .food-card {
        font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        cursor: pointer;
      }

      .menu-page .food-card .food-card-body {
        min-width: 0;
      }

      .menu-page .food-card .food-badge {
        margin-bottom: 7px;
        color: #b43e59;
        font-size: 12px;
        line-height: 1.35;
        font-weight: 800;
        letter-spacing: -0.01em;
      }

      .menu-page .food-card h3 {
        margin: 0 0 7px;
        color: #342429;
        font-family: var(--font-display);
        font-size: 21px;
        line-height: 1.4;
        font-weight: 400;
        letter-spacing: 0;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      .menu-page .food-card p {
        margin: 0 0 12px;
        color: #725e64;
        font-size: 14px;
        line-height: 1.6;
        font-weight: 550;
        letter-spacing: -0.015em;
      }

      .menu-page .small-food-card {
        min-height: 142px;
      }

      .menu-page .small-food-card .food-card-body {
        justify-content: center;
        padding: 14px 16px 14px 12px;
      }

      .menu-page .small-food-card h3 {
        margin-bottom: 4px;
        font-size: 19px;
        line-height: 1.45;
      }

      .menu-page .small-food-card .food-badge {
        margin-bottom: 4px;
        font-size: 11px;
      }

      .menu-page .small-food-card p {
        display: none;
      }

      .menu-page .food-card:hover h3,
      .menu-page .food-card:focus-visible h3 {
        color: var(--pink-deep);
      }

      .menu-page .food-card:focus-visible {
        outline: 3px solid rgba(223, 79, 109, 0.22);
        outline-offset: 3px;
      }

      @media (max-width: 560px) {
        .menu-page .product-price-lines { gap: 14px; }
        .menu-page .product-price-set .product-unit-label { font-size: 11px; }
        .menu-page .product-price-set .product-unit-price { font-size: 14px; }
        .menu-page .small-food-card .food-card-body { padding-right: 10px; }
      }
    </style>
  </head>
  <body class="menu-page">
    <header class="site-header" data-shared-header></header>

    <div class="event-ticker" aria-label="이벤트 안내" data-shared-ticker></div>

    <main>
      <section class="section menu-featured-section">
        <div class="menu-section-title">
          <div>
            <p class="section-kicker">BEST PRODUCTS</p>
            <h2>BEST 상품</h2>
          </div>
          <div class="featured-carousel-controls" aria-label="BEST 상품 이동">
            <button type="button" data-featured-prev aria-label="이전 BEST 상품">←</button>
            <span data-featured-position aria-live="polite">1 / 5</span>
            <button type="button" data-featured-next aria-label="다음 BEST 상품">→</button>
          </div>
        </div>
        <div class="food-card-grid featured-food-grid" aria-live="polite">
          <div class="menu-catalog-state is-loading" role="status"><strong>BEST 상품을 불러오고 있습니다.</strong></div>
        </div>
      </section>

      <section class="section menu-discovery" aria-label="메뉴 찾기">
        <div class="menu-filter-bar" aria-label="메뉴 분류">
          <div class="menu-category-bar" aria-label="메뉴 분류">
            <button type="button" class="is-active" data-filter="all">전체</button>
            <button type="button" data-filter="행사">백일/행사</button>
            <button type="button" data-filter="답례">답례/단체</button>
            <button type="button" data-filter="송편">송편</button>
            <button type="button" data-filter="설기">설기</button>
            <button type="button" data-filter="인절미">인절미</button>
            <button type="button" data-filter="찰떡">찰떡</button>
            <button type="button" data-filter="기본떡">기본떡</button>
          </div>
        </div>
      </section>

      <section class="section menu-section" id="menu-list">
        <div class="menu-list-head">
          <div>
            <h2 data-menu-list-title>전체 메뉴</h2>
            <p class="menu-result-summary" role="status"><strong data-menu-result-count>0</strong>개의 메뉴</p>
          </div>
        </div>

        <div class="menu-grid food-card-grid" data-products-grid aria-label="전체 메뉴" aria-live="polite">
          <div class="menu-catalog-state is-loading" role="status"><strong>메뉴를 불러오고 있습니다.</strong></div>
        </div>
        <p class="menu-empty" hidden>조건에 맞는 메뉴가 없습니다.</p>
        <nav class="menu-pagination" aria-label="전체 메뉴 페이지 이동"></nav>
      </section>
    </main>

    <footer class="site-footer" data-shared-footer></footer>

    <div class="product-detail-backdrop" hidden></div>
    <aside class="product-detail-panel" aria-label="상품 상세 안내" aria-hidden="true">
      <button class="product-detail-close" type="button" aria-label="상품 상세 닫기">닫기</button>
      <p class="section-kicker product-detail-category">MENU DETAIL</p>
      <h2 class="product-detail-name">상품명</h2>
      <p class="product-detail-desc">상품 설명</p>
      <strong class="product-detail-price">상담 후 안내</strong>
      <div class="product-detail-notice" aria-label="주문 전 확인 사항">
        <b>상담 전 확인</b>
        <span>행사·단체 구성은 일정과 수량에 맞춰 안내드립니다.</span>
        <span>매장 픽업과 배송 상담을 선택할 수 있습니다.</span>
        <span>희망 날짜와 수량을 남겨주시면 확인이 빠릅니다.</span>
      </div>
      <button class="primary-button product-detail-add" type="button">문의하기</button>
    </aside>

    <div class="order-request-backdrop" hidden></div>
    <aside class="order-request-panel" aria-label="주문 문의" aria-hidden="true">
      <button class="product-detail-close order-request-close" type="button" aria-label="주문 문의 닫기">닫기</button>
      <p class="section-kicker">ORDER REQUEST</p>
      <h2>주문 상담 요청</h2>
      <p class="order-request-lead">메뉴, 수량, 수령 일정을 남겨주시면 매장에서 확인 후 연락드립니다.</p>
      <form class="order-request-form">
        <input type="hidden" name="productId" />
        <label>
          <span>메뉴</span>
          <input type="text" name="displayProduct" readonly />
        </label>
        <div class="order-form-grid">
          <label>
            <span>수량</span>
            <input type="number" name="quantity" min="1" step="1" value="1" required />
          </label>
          <label>
            <span>희망 날짜</span>
            <input type="date" name="pickupDate" required />
          </label>
        </div>
        <div class="order-form-grid">
          <label>
            <span>픽업 시간</span>
            <input type="time" name="pickupTime" required />
          </label>
          <label>
            <span>연락처</span>
            <input type="tel" name="phone" placeholder="010-0000-0000" required />
          </label>
        </div>
        <div class="order-form-grid">
          <label>
            <span>수령 방식</span>
            <select name="fulfillmentType">
              <option value="pickup">매장 픽업</option>
              <option value="delivery">배송 상담</option>
            </select>
          </label>
          <label class="delivery-address-field">
            <span>배송 주소</span>
            <input type="text" name="deliveryAddress" placeholder="배송 필요 시 입력" />
          </label>
        </div>
        <label>
          <span>이름</span>
          <input type="text" name="customer" placeholder="주문자 이름" required />
        </label>
        <label>
          <span>요청사항</span>
          <textarea name="memo" rows="3" placeholder="포장, 행사 용도, 기타 요청사항"></textarea>
        </label>
        <button class="primary-button" type="submit">상담 요청 남기기</button>
        <p class="order-request-status" role="status"></p>
      </form>
    </aside>
    <script src="cart-utils.js"></script>
    <script src="js/ui.js"></script><script src="js/config.js"></script><script src="js/api.js"></script><script src="js/state.js"></script><script src="js/utils.js"></script><script src="js/components.js"></script><script src="js/home.js"></script><script src="js/search.js"></script><script src="js/cart.js"></script><script src="js/menu-order.js?v=27"></script><script src="js/auth.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
  </body>
</html>
