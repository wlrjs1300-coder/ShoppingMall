<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>따뜻한 떡집 | 비밀번호 찾기</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="login-page">
    <header class="site-header" data-shared-header></header>
    <main class="auth-page">
      <section class="auth-card">
        <h1>비밀번호 찾기</h1>
        <p class="auth-card-desc">가입한 아이디 또는 이메일을 입력해 주세요.</p>
        <form data-password-reset-request-form novalidate>
          <label>
            <span>아이디 또는 이메일</span>
            <input type="text" name="identifier" autocomplete="username" required />
          </label>
          <button class="primary-button" type="submit">재설정 안내 받기</button>
          <p class="auth-message" data-password-reset-request-message role="status" aria-live="polite"></p>
          <div class="demo-reset-result" data-demo-reset-result hidden>
            <strong>포트폴리오 시연용 개발 모드</strong>
            <p>실제 이메일 대신 아래 일회용 링크로 비밀번호 재설정 과정을 확인할 수 있습니다.</p>
            <a class="secondary-button" data-demo-reset-link href="#">비밀번호 재설정하기</a>
          </div>
        </form>
        <p class="auth-switch"><a href="login.html">로그인으로 돌아가기</a></p>
      </section>
    </main>
    <script src="cart-utils.js"></script>
    <script src="js/ui.js"></script><script src="js/config.js"></script><script src="js/api.js"></script><script src="js/state.js"></script><script src="js/utils.js"></script><script src="js/components.js"></script><script src="js/home.js"></script><script src="js/search.js"></script><script src="js/cart.js"></script><script src="js/auth.js"></script>
  </body>
</html>
