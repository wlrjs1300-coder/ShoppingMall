<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>따뜻한 떡집 | 로그인</title>
    <meta name="description" content="따뜻한 떡집 로그인 페이지입니다." />
    <meta name="theme-color" content="#fff3f7" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/logo.svg" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="manifest" href="manifest.json" />
  </head>
  <body class="login-page">
    <header class="site-header" data-shared-header></header>

    <div class="event-ticker" aria-label="이벤트 안내" data-shared-ticker></div>

    <main class="auth-page">
      <section class="auth-card">
        <h1>로그인</h1>
        <p class="auth-card-desc">원하시는 로그인 방법을 선택해 주세요.</p>

        <div class="social-login" aria-label="소셜 로그인">
          <a class="social-login-button is-kakao" data-social-provider="kakao" href="/api/auth/social/kakao">
            <span class="social-login-icon">K</span><span>카카오로 로그인</span>
          </a>
          <a class="social-login-button is-naver" data-social-provider="naver" href="/api/auth/social/naver">
            <span class="social-login-icon">N</span><span>네이버로 로그인</span>
          </a>
          <a class="social-login-button is-google" data-social-provider="google" href="/api/auth/social/google">
            <span class="social-login-icon">G</span><span>Google로 로그인</span>
          </a>
          <p class="auth-message social-login-message" data-social-login-message role="status" aria-live="polite"></p>
          <p class="social-login-note">처음 이용하는 소셜 계정은 인증 후 간단한 약관 동의를 거쳐 시작합니다.</p>
        </div>

        <form class="login-credential-panel" id="email-login-panel" data-login-form novalidate>
          <div class="social-login-divider"><span>아이디 로그인</span></div>
          <label>
            <span>아이디</span>
            <input type="text" name="identifier" autocomplete="username" required />
          </label>
          <label>
            <span>비밀번호</span>
            <input type="password" name="password" autocomplete="current-password" required />
          </label>

          <button class="primary-button" type="submit">로그인</button>
          <p class="auth-message" data-login-message role="status" aria-live="polite"></p>
        </form>

        <p class="auth-switch">비밀번호를 잊으셨나요? <a href="forgot-password.html">비밀번호 찾기</a></p>
        <p class="auth-switch">아직 계정이 없으신가요? <a href="signup.html">회원가입</a></p>
        <p class="auth-switch auth-guest-switch"><span class="auth-guest-prompt">비회원이신가요?</span><a href="guest-order.html" data-guest-checkout>주문하기</a><span aria-hidden="true">/</span><a href="guest-order-lookup.html">주문조회</a></p>
      </section>
    </main>

    <footer class="site-footer" data-shared-footer></footer>

    <script src="cart-utils.js"></script>
    <script src="js/ui.js"></script><script src="js/config.js"></script><script src="js/api.js"></script><script src="js/state.js"></script><script src="js/utils.js"></script><script src="js/components.js"></script><script src="js/home.js"></script><script src="js/search.js"></script><script src="js/cart.js"></script><script src="js/auth.js?v=20260718-social"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
  </body>
</html>
