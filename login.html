<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>따뜻한 떡집 | 로그인</title>
    <meta name="description" content="따뜻한 떡집 로그인 페이지입니다." />
    <meta name="theme-color" content="#fff3f7" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/logo.svg" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="manifest" href="manifest.json" />
  </head>
  <body class="login-page">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="따뜻한 떡집 홈">
        <img class="brand-logo" src="assets/logo.svg" alt="따뜻한 떡집" />
      </a>
      <form class="header-search" role="search" action="menu.html" method="get">
        <input type="search" id="menuSearch" name="q" placeholder="메뉴 검색" aria-label="메뉴 검색" autocomplete="off" />
        <button type="submit" aria-label="검색">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </form>
      <div class="header-actions">
        <a class="header-text-link" data-auth-signup-link href="signup.html">회원가입</a>
        <a class="header-text-link is-current" data-auth-login-link href="login.html">로그인</a>
        <a class="header-text-link" href="faq.html">고객센터</a>
        <a class="header-text-link" href="#">장바구니</a>
      </div>
    </header>

    <main class="auth-page">
      <section class="auth-card">
        <h1>로그인</h1>
        <p class="auth-card-desc">가입하신 이메일과 비밀번호로 로그인해 주세요.</p>

        <form data-login-form novalidate>
          <label>
            <span>이메일</span>
            <input type="email" name="email" autocomplete="email" required />
          </label>
          <label>
            <span>비밀번호</span>
            <input type="password" name="password" autocomplete="current-password" required />
          </label>

          <button class="primary-button" type="submit">로그인</button>
          <p class="auth-message" data-login-message role="status" aria-live="polite"></p>
        </form>

        <p class="auth-switch">비밀번호를 잊으셨나요? <span class="auth-switch-disabled">추후 제공 예정입니다.</span></p>
        <p class="auth-switch">아직 계정이 없으신가요? <a href="signup.html">회원가입</a></p>
      </section>
    </main>

    <footer class="site-footer">
      <div>
        <strong>따뜻한 떡집</strong>
        <span>경기도 화성시 소재</span>
      </div>
      <div>
        <span class="js-phone-text">031-000-0000</span>
        <span class="js-hours-text">영업 중 · 19:00에 영업 종료</span>
        <span class="footer-actions">
          <a class="js-phone-link" href="tel:0310000000">전화 상담</a>
          <a class="js-map-link" href="#" target="_blank" rel="noreferrer">지도 보기</a>
        </span>
      </div>
    </footer>

    <script src="script.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
  </body>
</html>
