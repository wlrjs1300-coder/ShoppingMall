<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>따뜻한 떡집 | 비회원 주문조회</title>
    <meta name="description" content="비회원 주문번호와 주문 정보를 확인합니다." />
    <meta name="theme-color" content="#fff3f7" />
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="guest-order-lookup-page">
    <header class="site-header" data-shared-header></header>
    <div class="event-ticker" aria-label="이벤트 안내" data-shared-ticker></div>

    <main class="auth-page">
      <section class="auth-card">
        <header class="guest-lookup-head">
          <span class="guest-lookup-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 4h14v16H5zM8 8h8M8 12h5M8 16h4"/></svg></span>
          <div><p>GUEST ORDER</p><h1>비회원 주문조회</h1><span>주문할 때 입력한 정보로 주문 진행 상태를 확인하세요.</span></div>
        </header>
        <div class="guest-lookup-guide"><b>주문번호를 어디서 확인하나요?</b><span>주문 완료 화면에서 안내된 <strong>checkout-</strong>로 시작하는 접수번호를 입력해 주세요.</span></div>
        <form data-guest-order-lookup-form novalidate autocomplete="off">
          <label><span>주문번호</span><div class="guest-lookup-input"><svg aria-hidden="true" viewBox="0 0 24 24"><path d="M6 4h12v16H6zM9 9h6M9 13h4"/></svg><input type="text" name="orderId" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="checkout-로 시작하는 접수번호" required /></div></label>
          <label><span>연락처</span><div class="guest-lookup-input"><svg aria-hidden="true" viewBox="0 0 24 24"><path d="M7 3h3l1 5-2 1c1 3 3 5 6 6l1-2 5 1v3c0 2-1 3-3 3C10 20 4 14 4 6c0-2 1-3 3-3z"/></svg><input type="tel" name="phone" maxlength="13" inputmode="tel" autocomplete="off" data-lpignore="true" placeholder="010-0000-0000" required /></div></label>
          <label><span>주문 조회 비밀번호</span><div class="guest-lookup-input"><svg aria-hidden="true" viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg><input type="password" name="password" maxlength="72" autocomplete="off" data-lpignore="true" placeholder="주문할 때 설정한 비밀번호" required /></div></label>
          <button class="primary-button" type="submit"><span>주문 조회하기</span><svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="5.5"/><path d="m15 15 4 4"/></svg></button>
          <p class="auth-message" data-guest-lookup-message role="alert" aria-live="polite"></p>
        </form>

        <section class="guest-order-result" data-guest-order-result hidden aria-live="polite">
          <h2>주문 정보</h2>
          <dl>
            <div><dt>주문번호</dt><dd data-guest-result-id></dd></div>
            <div><dt>상품</dt><dd data-guest-result-product></dd></div>
            <div><dt>주문 상태</dt><dd data-guest-result-status></dd></div>
            <div><dt>수령 예정</dt><dd data-guest-result-pickup></dd></div>
            <div><dt>결제 예정 금액</dt><dd data-guest-result-total></dd></div>
          </dl>
        </section>

        <p class="auth-switch">새로운 주문이 필요하신가요? <a href="guest-order.html">비회원으로 주문하기</a></p>
      </section>
    </main>

    <footer class="site-footer" data-shared-footer></footer>
    <script src="cart-utils.js"></script>
    <script src="js/ui.js"></script><script src="js/config.js"></script><script src="js/api.js"></script><script src="js/state.js"></script><script src="js/utils.js"></script><script src="js/components.js"></script><script src="js/home.js"></script><script src="js/search.js"></script><script src="js/cart.js"></script><script src="js/auth.js"></script>
  </body>
</html>
