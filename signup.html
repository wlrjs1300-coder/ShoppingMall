<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>따뜻한 떡집 | 회원가입</title>
    <meta name="description" content="따뜻한 떡집 회원가입 페이지입니다." />
    <meta name="theme-color" content="#fff3f7" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/logo.svg" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="manifest" href="manifest.json" />
  </head>
  <body class="signup-page">
    <header class="site-header" data-shared-header></header>

    <div class="event-ticker" aria-label="이벤트 안내" data-shared-ticker></div>

    <main class="auth-page">
      <section class="auth-card">
        <h1>회원가입</h1>

        <form data-signup-form novalidate>
          <label>
            <span>이름</span>
            <input type="text" name="name" autocomplete="name" required />
          </label>
          <label>
            <span>아이디</span>
            <div class="auth-field-with-button"><input type="text" name="username" autocomplete="username" placeholder="영문 소문자·숫자·밑줄 4~20자" minlength="4" maxlength="20" required /><button type="button" class="auth-inline-button" data-check-username>중복 확인</button></div>
            <p class="auth-field-error" data-username-check-message aria-live="polite"></p>
          </label>
          <label>
            <span>휴대폰 번호</span>
            <div class="auth-field-with-button">
              <input type="tel" name="phone" placeholder="010-0000-0000" autocomplete="tel" data-phone-input required />
              <button type="button" class="auth-inline-button" data-send-code-button>인증번호 받기</button>
            </div>
          </label>

          <div class="auth-code-row" data-code-row hidden>
            <label>
              <span>인증번호</span>
              <div class="auth-field-with-button">
                <input type="text" name="phoneCode" inputmode="numeric" placeholder="6자리 숫자" maxlength="6" data-code-input />
                <button type="button" class="auth-inline-button" data-verify-code-button>확인</button>
              </div>
            </label>
            <p class="auth-field-hint" data-code-timer></p>
            <p class="auth-field-hint" data-dev-code-hint hidden></p>
            <p class="auth-field-error" role="status" aria-live="polite" data-code-message></p>
          </div>

          <label>
            <span>이메일</span>
            <div class="auth-field-with-button"><input type="email" name="email" autocomplete="email" required /><button type="button" class="auth-inline-button" data-check-email>중복 확인</button></div>
            <p class="auth-field-error" data-email-check-message aria-live="polite"></p>
          </label>
          <label>
            <span>우편번호</span>
            <div class="auth-field-with-button">
              <input type="text" name="postalCode" placeholder="주소 검색을 이용해 주세요" inputmode="numeric" autocomplete="postal-code" readonly />
              <button type="button" class="auth-inline-button" data-address-search>주소 검색</button>
            </div>
          </label>
          <label>
            <span>배송지 주소</span>
            <input type="text" name="address" placeholder="주소 검색을 이용해 주세요" autocomplete="street-address" readonly required />
          </label>
          <label>
            <span>상세 주소</span>
            <input type="text" name="addressDetail" placeholder="동/호수 등 상세 주소" autocomplete="address-line2" />
          </label>
          <label>
            <span>비밀번호</span>
            <input type="password" name="password" autocomplete="new-password" minlength="8" data-password-input required />
            <p class="auth-field-hint">8자 이상 입력해 주세요. 영문·숫자·특수문자 조합을 권장합니다.</p>
            <p class="auth-field-error" role="status" aria-live="polite" data-password-rule-error></p>
          </label>
          <label>
            <span>비밀번호 확인</span>
            <input type="password" name="passwordConfirm" autocomplete="new-password" minlength="8" data-password-confirm-input required />
            <p class="auth-field-error" role="status" aria-live="polite" data-password-match-error></p>
          </label>

          <div class="auth-agree-group">
            <label class="auth-agree auth-agree-all">
              <input type="checkbox" data-agree-all />
              <span>전체 동의</span>
            </label>
            <label class="auth-agree">
              <input type="checkbox" name="agreeTerms" required />
              <span><a href="terms.html" target="_blank" rel="noreferrer">이용약관</a> 동의 <b>(필수)</b></span>
            </label>
            <label class="auth-agree">
              <input type="checkbox" name="agreePrivacy" required />
              <span><a href="privacy.html" target="_blank" rel="noreferrer">개인정보 수집 및 이용</a> 동의 <b>(필수)</b></span>
            </label>
            <label class="auth-agree">
              <input type="checkbox" name="agreeMarketing" />
              <span>마케팅 정보 수신 동의 (선택)</span>
            </label>
          </div>

          <button class="primary-button" type="submit">가입하기</button>
          <p class="auth-card-message" role="status" aria-live="polite" data-signup-message></p>
        </form>

        <p class="auth-switch">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
      </section>
    </main>

    <footer class="site-footer" data-shared-footer></footer>

    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script src="cart-utils.js"></script>
    <script src="js/ui.js"></script><script src="js/config.js"></script><script src="js/api.js"></script><script src="js/state.js"></script><script src="js/utils.js"></script><script src="js/components.js"></script><script src="js/home.js"></script><script src="js/search.js"></script><script src="js/cart.js"></script><script src="js/auth.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
  </body>
</html>
