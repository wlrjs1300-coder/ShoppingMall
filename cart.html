<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>따뜻한 떡집 | 장바구니</title>
    <meta name="description" content="따뜻한 떡집 장바구니입니다." />
    <meta name="theme-color" content="#fff3f7" />
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css?v=20" />
    <style>
      .cart-page .app-toast-region {
        top: 22px;
        width: min(520px, calc(100% - 32px));
        gap: 10px;
      }

      .cart-page .app-toast--action {
        position: relative;
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr) auto;
        align-items: center;
        gap: 13px;
        overflow: hidden;
        min-height: 72px;
        padding: 12px 13px 12px 14px;
        border: 1px solid #efd8de;
        border-radius: 16px;
        color: #4c343a;
        background: rgba(255, 255, 255, 0.97);
        box-shadow: 0 18px 48px rgba(73, 39, 48, 0.17);
        backdrop-filter: blur(12px);
      }

      .cart-page .app-toast--action::after {
        content: "";
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        height: 3px;
        background: linear-gradient(90deg, #e65f7f, #df4f6d);
        transform-origin: left;
        animation: cart-toast-timer var(--toast-duration, 7000ms) linear forwards;
      }

      .cart-page .app-toast__icon {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border-radius: 13px;
        color: #d94d6b;
        background: #fff0f4;
      }

      .cart-page .app-toast__icon svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .cart-page .app-toast__message {
        min-width: 0;
        color: #513940;
        font-size: 14px;
        line-height: 1.5;
        font-weight: 750;
        word-break: keep-all;
      }

      .cart-page .app-toast--action button {
        min-height: 40px;
        padding: 0 15px;
        border: 1px solid #e6bdc7;
        border-radius: 11px;
        color: #c83f5e;
        background: #fff7f9;
        font-size: 13px;
        font-weight: 900;
        white-space: nowrap;
        transition: color 160ms ease, background 160ms ease, border-color 160ms ease,
          transform 160ms ease;
      }

      .cart-page .app-toast--action button:hover,
      .cart-page .app-toast--action button:focus-visible {
        border-color: var(--pink-deep);
        color: #fff;
        background: var(--pink-deep);
        transform: translateY(-1px);
      }

      @keyframes cart-toast-timer {
        from { transform: scaleX(1); }
        to { transform: scaleX(0); }
      }

      @media (max-width: 560px) {
        .cart-page .app-toast-region { top: 12px; }
        .cart-page .app-toast--action {
          grid-template-columns: 38px minmax(0, 1fr);
          gap: 10px;
          padding: 11px 12px 12px;
        }
        .cart-page .app-toast__icon { width: 38px; height: 38px; }
        .cart-page .app-toast--action button {
          grid-column: 1 / -1;
          width: 100%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .cart-page .app-toast--action::after { animation: none; }
      }
    </style>
  </head>
  <body class="cart-page">
    <header class="site-header" data-shared-header></header>
    <div class="event-ticker" aria-label="이벤트 안내" data-shared-ticker></div>

    <main class="cart-container">
      <div class="cart-heading">
        <h1>장바구니</h1>
        <ol class="cart-steps" aria-label="주문 진행 단계"><li class="is-current"><b>01</b> 장바구니</li><li><b>02</b> 주문/결제</li><li><b>03</b> 주문완료</li></ol>
      </div>
      <div class="cart-layout">
        <section class="cart-products">
          <div class="cart-products-title"><strong>일반 상품</strong><span>주문 일정과 수령 방법은 상담 시 확정됩니다.</span></div>
          <div class="cart-products-toolbar">
            <label><input type="checkbox" data-cart-select-all checked /><span>전체 선택</span><b data-cart-selected-label>0 / 0</b></label>
            <div><button type="button" data-cart-delete-selected>선택 삭제</button><button type="button" data-cart-clear hidden>전체 삭제</button></div>
          </div>
          <div class="cart-list" data-cart-list aria-live="polite"></div>
        </section>
        <aside class="cart-summary" data-cart-summary>
          <h2>주문 예상 금액</h2>
          <dl><div><dt>선택 상품</dt><dd data-cart-total-count>0말</dd></div><div><dt>상품 금액</dt><dd data-cart-subtotal-price>0원</dd></div><div><dt>배송비</dt><dd>상담 후 안내</dd></div><div class="is-total"><dt>예상 합계</dt><dd data-cart-total-price>0원</dd></div></dl>
          <a class="primary-button cart-order-button" data-cart-order-button href="checkout.html">상품 주문하기</a>
          <a class="cart-summary-continue" href="menu.html">상품 더 담기</a>
          <p>행사 일정과 수량에 따라 최종 금액이 달라질 수 있습니다.<br />상담 후 정확한 주문 금액을 안내해 드립니다.</p>
        </aside>
      </div>
    </main>
    <footer class="site-footer" data-shared-footer></footer>
    <script src="cart-utils.js"></script>
    <script src="js/ui.js?v=2"></script><script src="js/config.js"></script><script src="js/api.js"></script><script src="js/state.js"></script><script src="js/utils.js"></script><script src="js/components.js"></script><script src="js/home.js"></script><script src="js/search.js"></script><script src="js/cart.js?v=2"></script><script src="js/auth.js"></script>
  </body>
</html>
