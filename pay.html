<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 - 따뜻한 떡집</title>
  <meta name="theme-color" content="#fff3f7" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
  <script src="https://js.tosspayments.com/v2/standard"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #faf8f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .pay-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }
    .pay-header {
      background: linear-gradient(135deg, #f78fa3 0%, #df4f6d 100%);
      color: #fff;
      padding: 24px;
      text-align: center;
    }
    .pay-header h1 { font-size: 1.2rem; font-weight: 700; }
    .pay-header p { font-size: 0.85rem; opacity: .7; margin-top: 4px; }
    .pay-body { padding: 24px; }
    .order-summary {
      background: #faf8f5;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .order-summary h2 { font-size: 0.8rem; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: .05em; }
    .order-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 0.9rem; }
    .order-row:last-child { margin-bottom: 0; border-top: 1px solid #e8e0d6; padding-top: 10px; margin-top: 6px; }
    .order-row:last-child strong { font-size: 1.05rem; color: #df4f6d; }
    .order-label { color: #666; }
    #payment-method { margin-bottom: 8px; }
    .direct-methods { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
    .direct-methods label { cursor: pointer; }
    .direct-methods input { position: absolute; opacity: 0; }
    .direct-methods span { display: grid; min-height: 46px; place-items: center; padding: 8px; border: 1px solid #eadde0; border-radius: 9px; color: #68545a; background: #fff; font-size: .82rem; font-weight: 700; }
    .direct-methods input:checked + span { color: #df4f6d; border-color: #df4f6d; background: #fff2f5; box-shadow: 0 0 0 2px rgba(223,79,109,.08); }
    .payment-guide { margin: 0 0 16px; padding: 11px 13px; border-radius: 9px; color: #806970; background: #faf5f6; font-size: .78rem; line-height: 1.55; }
    #agreement { margin-bottom: 20px; }
    #pay-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(145deg, #f78fa3, #df4f6d);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    #pay-btn:hover { opacity: .88; }
    #pay-btn:disabled { background: #bbb; cursor: not-allowed; }
    .result-box { padding: 32px 24px; text-align: center; }
    .result-icon { font-size: 3rem; margin-bottom: 16px; }
    .result-box h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
    .result-box p { color: #666; font-size: 0.9rem; line-height: 1.6; }
    .result-box.success h2 { color: #2d6a4f; }
    .result-box.fail h2 { color: #c0392b; }
    #loading { padding: 40px; text-align: center; color: #888; }
    .error-box { padding: 32px 24px; text-align: center; color: #c0392b; }
    .retry-btn { margin-top: 20px; padding: 12px 22px; border: 1px solid #df4f6d; border-radius: 9px; background: #fff; color: #df4f6d; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
<div class="pay-card">
  <div class="pay-header">
    <h1>따뜻한 떡집</h1>
    <p>안전한 결제를 진행합니다</p>
  </div>

  <div id="loading">결제 정보를 불러오는 중…</div>

  <!-- 결제 위젯 영역 -->
  <div id="step-payment" class="pay-body" hidden>
    <div class="order-summary">
      <h2>주문 내역</h2>
      <div class="order-row"><span class="order-label">상품명</span><span id="info-name">-</span></div>
      <div class="order-row"><span class="order-label">주문자</span><span id="info-customer">-</span></div>
      <div class="order-row"><span class="order-label">결제 금액</span><strong id="info-amount">-</strong></div>
    </div>
    <div id="payment-method"></div>
    <div id="agreement"></div>
    <button id="pay-btn" disabled>결제하기</button>
  </div>

  <!-- 결제 완료 -->
  <div id="step-success" class="result-box success" hidden>
    <div class="result-icon">✅</div>
    <h2>결제 완료!</h2>
    <p>주문해 주셔서 감사합니다.<br />따뜻한 떡집에서 정성껏 준비하겠습니다.</p>
  </div>

  <!-- 결제 실패 -->
  <div id="step-fail" class="result-box fail" hidden>
    <div class="result-icon">❌</div>
    <h2>결제 실패</h2>
    <p id="fail-message">결제에 실패했습니다. 다시 시도해 주세요.</p>
    <button id="retry-btn" class="retry-btn" type="button">다시 시도</button>
  </div>
</div>

<script src="cart-utils.js"></script><script src="js/ui.js"></script>
<script>
  const API_BASE = window.location.protocol === "file:"
    ? "http://localhost:3001/api"
    : `${window.location.origin}/api`;
  const params = new URLSearchParams(location.search);
  const orderId = params.get("orderId");
  const step = params.get("step");
  const linkToken = params.get("token");
  const cacheKey = `tteok-payment-session:${orderId || "unknown"}`;

  function readSession() {
    try { return JSON.parse(sessionStorage.getItem(cacheKey) || "null"); } catch { return null; }
  }

  function saveSession(value) { sessionStorage.setItem(cacheKey, JSON.stringify(value)); }

  function show(id) {
    ["loading", "step-payment", "step-success", "step-fail"].forEach((s) => {
      const el = document.getElementById(s);
      if (el) el.hidden = s !== id;
    });
  }

  function formatWon(n) {
    return Number(n).toLocaleString("ko-KR") + "원";
  }

  async function init() {
    if (!orderId) {
      show("step-fail");
      document.getElementById("fail-message").textContent = "잘못된 결제 링크입니다.";
      return;
    }

    // 결제 완료 리다이렉트 처리
    if (step === "success") {
      await handleSuccess();
      return;
    }
    if (step === "fail") {
      show("step-fail");
      const errorCode = params.get("code");
      const errorMessage = params.get("message") || "결제에 실패했습니다. 다시 시도해 주세요.";
      document.getElementById("fail-message").textContent = `${errorMessage}${errorCode ? ` (${errorCode})` : ""}`;
      return;
    }

    // 결제 정보 + 클라이언트 키 병렬 로드
    let cached = readSession();
    const [infoRes, configRes] = await Promise.all([
      cached ? Promise.resolve(null) : fetch(`${API_BASE}/payments/info/${encodeURIComponent(orderId)}?token=${encodeURIComponent(linkToken || "")}`).catch(() => null),
      fetch(`${API_BASE}/payments/config`).catch(() => null),
    ]);

    if (!cached && (!infoRes || !infoRes.ok)) {
      show("step-fail");
      document.getElementById("fail-message").textContent = "결제 정보를 찾을 수 없습니다.";
      return;
    }

    if (!cached) {
      const info = await infoRes.json();
      cached = { info, sessionToken: info.sessionToken };
      saveSession(cached);
    }
    const info = cached.info;
    const config = configRes ? await configRes.json() : {};

    if (info.status === "DONE") {
      show("step-success");
      return;
    }

    if (!config.clientKey) {
      show("step-fail");
      document.getElementById("fail-message").textContent = "결제 서비스가 아직 설정되지 않았습니다.";
      return;
    }

    // 주문 정보 표시
    document.getElementById("info-name").textContent = info.orderName || "따뜻한 떡집 주문";
    document.getElementById("info-customer").textContent = info.customerName || "-";
    document.getElementById("info-amount").textContent = formatWon(info.amount);

    show("step-payment");
    await initWidget(config.clientKey, info);
  }

  async function initWidget(clientKey, info) {
    if (typeof TossPayments !== "function") throw new Error("결제 모듈을 불러오지 못했습니다. 네트워크 상태를 확인해 주세요.");
    if (!/^(?:test|live)_gck_/.test(clientKey)) {
      await initDirectPayment(clientKey, info);
      return;
    }
    const tossPayments = TossPayments(clientKey);
    const widgets = tossPayments.widgets({ customerKey: orderId });

    await widgets.setAmount({ currency: "KRW", value: info.amount });

    await Promise.all([
      widgets.renderPaymentMethods({ selector: "#payment-method", variantKey: "DEFAULT" }),
      widgets.renderAgreement({ selector: "#agreement", variantKey: "AGREEMENT" }),
    ]);

    const payBtn = document.getElementById("pay-btn");
    payBtn.disabled = false;

    const baseUrl = location.href.split("?")[0];
    payBtn.addEventListener("click", async () => {
      payBtn.disabled = true;
      payBtn.textContent = "결제 진행 중…";
      try {
        await widgets.requestPayment({
          orderId,
          orderName: info.orderName || "따뜻한 떡집 주문",
          customerName: info.customerName || undefined,
          successUrl: `${baseUrl}?step=success&orderId=${encodeURIComponent(orderId)}&token=${encodeURIComponent(linkToken || "")}`,
          failUrl: `${baseUrl}?step=fail&orderId=${encodeURIComponent(orderId)}&token=${encodeURIComponent(linkToken || "")}`,
        });
      } catch (err) {
        payBtn.disabled = false;
        payBtn.textContent = "결제하기";
        if (err.code !== "USER_CANCEL") {
          AppUI.alert(err.message || "결제 중 오류가 발생했습니다.");
        }
      }
    });
  }

  async function initDirectPayment(clientKey, info) {
    const tossPayments = TossPayments(clientKey);
    const customerKeyStorage = `tteok-payment-customer:${orderId}`;
    let customerKey = sessionStorage.getItem(customerKeyStorage);
    if (!customerKey) {
      customerKey = crypto.randomUUID ? crypto.randomUUID() : `guest-${Date.now()}-${Math.random().toString(36).slice(2, 12)}`;
      sessionStorage.setItem(customerKeyStorage, customerKey);
    }
    const payment = tossPayments.payment({ customerKey });
    const methodRoot = document.getElementById("payment-method");
    const preferred = info.paymentMethod === "transfer" ? "TRANSFER" : "CARD";
    const methods = [
      ["CARD", "카드·간편결제"],
      ["TRANSFER", "계좌이체"],
      ["MOBILE_PHONE", "휴대폰 결제"],
    ];
    methodRoot.innerHTML = `<div class="direct-methods">${methods.map(([value, label]) => `<label><input type="radio" name="directPaymentMethod" value="${value}" ${value === preferred ? "checked" : ""}><span>${label}</span></label>`).join("")}</div><p class="payment-guide">카드·간편결제를 선택하면 토스 결제창에서 카드 또는 지원되는 간편결제를 고를 수 있습니다.</p>`;
    document.getElementById("agreement").hidden = true;
    const payBtn = document.getElementById("pay-btn");
    payBtn.disabled = false;
    const baseUrl = location.href.split("?")[0];
    payBtn.addEventListener("click", async () => {
      const selected = methodRoot.querySelector('input[name="directPaymentMethod"]:checked')?.value || "CARD";
      payBtn.disabled = true;
      payBtn.textContent = "결제 진행 중…";
      try {
        const request = {
          method: selected,
          amount: { currency: "KRW", value: info.amount },
          orderId,
          orderName: info.orderName || "따뜻한 떡집 주문",
          customerName: info.customerName || undefined,
          successUrl: `${baseUrl}?step=success&orderId=${encodeURIComponent(orderId)}&token=${encodeURIComponent(linkToken || "")}`,
          failUrl: `${baseUrl}?step=fail&orderId=${encodeURIComponent(orderId)}&token=${encodeURIComponent(linkToken || "")}`,
        };
        await payment.requestPayment(request);
      } catch (error) {
        payBtn.disabled = false;
        payBtn.textContent = "결제하기";
        if (error.code !== "USER_CANCEL") AppUI.alert(`${error.message || "결제창을 열지 못했습니다."}${error.code ? ` (${error.code})` : ""}`);
      }
    });
  }

  async function handleSuccess() {
    const paymentKey = params.get("paymentKey");
    const amount = Number(params.get("amount"));
    const existingSession = readSession();

    if (existingSession?.completed) {
      show("step-success");
      return;
    }

    if (!paymentKey || !amount) {
      show("step-fail");
      document.getElementById("fail-message").textContent = "결제 확인에 필요한 정보가 없습니다.";
      return;
    }

    const cached = existingSession;
    if (!cached?.sessionToken) {
      show("step-fail");
      document.getElementById("fail-message").textContent = "결제 세션이 만료되었습니다. 새 결제 링크를 요청해 주세요.";
      return;
    }
    const res = await fetch(`${API_BASE}/payments/confirm`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Payment-Session": cached.sessionToken },
      body: JSON.stringify({ paymentKey, orderId, amount }),
    }).catch(() => null);

    if (res && res.ok) {
      const data = await res.json();
      if (data.ok) {
        const cart = CartUtils.parseCart(localStorage.getItem("tteokShoppingCart"));
        localStorage.setItem("tteokShoppingCart", CartUtils.serializeCart(CartUtils.removeItems(cart, data.productIds || [])));
        saveSession({ ...cached, completed: true });
        show("step-success");
        return;
      }
    }

    show("step-fail");
    document.getElementById("fail-message").textContent = "결제 승인 처리 중 오류가 발생했습니다.";
  }

  document.getElementById("retry-btn").addEventListener("click", () => {
    const baseUrl = location.href.split("?")[0];
    location.href = `${baseUrl}?orderId=${encodeURIComponent(orderId)}&token=${encodeURIComponent(linkToken || "")}`;
  });

  init().catch((err) => {
    console.error(err);
    show("step-fail");
    document.getElementById("fail-message").textContent = err?.message || "결제 화면을 준비하지 못했습니다.";
  });
</script>
</body>
</html>
