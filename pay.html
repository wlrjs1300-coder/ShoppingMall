<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 - 따뜻한 떡집</title>
  <meta name="theme-color" content="#fff3f7" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
  <script src="https://js.tosspayments.com/v2/standard"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:#382a2e;
      background: radial-gradient(circle at 50% 0,#fff 0,#fff9fa 42%,#f8f4f2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 38px 16px;
    }
    .pay-card {
      background: #fff;
      border:1px solid #f0dfe3;
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(83,49,58,.13);
      width: 100%;
      max-width: 610px;
      overflow: hidden;
    }
    .pay-header {
      position:relative;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      color:#382a2e;
      padding:26px 32px;
      border-bottom:1px solid #f1dfe3;
      background:linear-gradient(135deg,#fff 0%,#fff7f9 100%);
      text-align:left;
    }
    .pay-header small { display:block; margin-bottom:5px; color:#df4f6d; font-size:.66rem; font-weight:900; letter-spacing:.15em; }
    .pay-header h1 { font-size: 1.35rem; font-weight: 900; letter-spacing:-.04em; }
    .pay-header p { margin-top:6px; color:#8b747a; font-size: .78rem; }
    .pay-security { display:flex; align-items:center; gap:7px; padding:9px 12px; border:1px solid #edd5db; border-radius:999px; color:#765e65; background:#fff; font-size:.7rem; font-weight:800; white-space:nowrap; }
    .pay-security svg { width:15px; height:15px; fill:none; stroke:#df4f6d; stroke-width:2; }
    .pay-body { padding: 30px 32px 32px; }
    .order-summary {
      border:1px solid #eee0e3;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 26px;
      background:#fffdfd;
    }
    .order-summary h2 { margin-bottom:14px; color:#382a2e; font-size:.92rem; font-weight:900; }
    .order-row { display:flex; justify-content:space-between; align-items:flex-start; gap:28px; margin-bottom:10px; font-size:.82rem; }
    .order-row > :last-child { max-width:70%; text-align:right; font-weight:750; }
    .order-row:last-child { align-items:center; margin:16px 0 0; padding-top:16px; border-top:1px solid #eadde0; }
    .order-row:last-child strong { color:#df4f6d; font-size:1.3rem; font-weight:900; }
    .order-label { color:#8b747a; }
    .payment-section-title { display:flex; align-items:flex-end; justify-content:space-between; gap:12px; margin-bottom:12px; }
    .payment-section-title h2 { font-size:.94rem; font-weight:900; }
    .payment-section-title small { color:#a08b91; font-size:.68rem; }
    #payment-method { margin-bottom: 8px; }
    .direct-methods { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin-bottom:16px; }
    .direct-methods label { cursor: pointer; }
    .direct-methods input { position: absolute; opacity: 0; }
    .direct-methods span { display:grid; min-height:54px; place-items:center; padding:9px; border:1px solid #eadde0; border-radius:12px; color:#68545a; background:#fff; font-size:.8rem; font-weight:800; transition:.16s ease; }
    .direct-methods label:hover span { border-color:#dfa7b4; background:#fffafb; }
    .direct-methods input:checked + span { color:#df4f6d; border-color:#df4f6d; background:#fff2f5; box-shadow:0 6px 18px rgba(223,79,109,.1); }
    .payment-guide { margin:0 0 20px; padding:17px 18px; border:1px solid #f0e1e5; border-radius:14px; color:#806970; background:#fff9fa; font-size:.76rem; line-height:1.6; }
    .payment-guide strong { display:block; margin-bottom:4px; color:#49383d; font-size:.82rem; }
    .payment-guide p { margin:0; }
    .payment-easy-list { display:flex; flex-wrap:wrap; gap:7px; margin-top:11px; }
    .payment-easy-list span { display:inline-flex; align-items:center; min-height:28px; padding:0 10px; border:1px solid #eadde0; border-radius:7px; color:#4f4145; background:#fff; font-size:.7rem; font-weight:800; }
    .payment-easy-list .is-kakao { border-color:#f1dc45; color:#3b3424; background:#fff8bc; }
    .payment-easy-list .is-ssg { border-color:#e7ccd3; color:#c83255; }
    .payment-easy-list .is-naver { border-color:#bfe8cd; color:#168a46; background:#f2fff6; }
    .payment-easy-list .is-samsung { border-color:#cfd8ee; color:#284a93; background:#f5f8ff; }
    .payment-easy-list .is-payco { border-color:#f0c9ce; color:#d63c4e; background:#fff6f7; }
    .payment-guide-note { display:block; margin-top:9px; color:#9a858b; font-size:.66rem; line-height:1.45; }
    #agreement { margin-bottom: 20px; }
    #pay-btn {
      width: 100%;
      min-height:56px;
      padding: 15px;
      background: linear-gradient(145deg, #f78fa3, #df4f6d);
      color: #fff;
      border: none;
      border-radius: 13px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    #pay-btn:hover { box-shadow:0 10px 24px rgba(223,79,109,.23); transform:translateY(-1px); }
    #pay-btn:disabled { background: #bbb; cursor: not-allowed; }
    .result-box { padding: 32px 24px; text-align: center; }
    .result-icon { font-size: 3rem; margin-bottom: 16px; }
    .result-box h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
    .result-box p { color: #666; font-size: 0.9rem; line-height: 1.6; }
    .result-box.success h2 { color: #2d6a4f; }
    .result-box.fail h2 { color: #c0392b; }
    #loading { padding: 40px; text-align: center; color: #888; }
    .error-box { padding: 32px 24px; text-align: center; color: #c0392b; }
    .retry-btn { margin-top: 20px; padding: 12px 22px; border: 1px solid #df4f6d; border-radius: 9px; background: #fff; color: #df4f6d; font-weight: 700; cursor: pointer; }
    @media(max-width:560px){body{padding:0;background:#fff}.pay-card{min-height:100vh;border:0;border-radius:0;box-shadow:none}.pay-header{padding:22px 20px}.pay-security{display:none}.pay-body{padding:24px 20px}.direct-methods{grid-template-columns:1fr}.order-row>:last-child{max-width:64%}}
  </style>
</head>
<body>
<div class="pay-card">
  <div class="pay-header">
    <div><small>SECURE CHECKOUT</small><h1>따뜻한 떡집 결제</h1><p>주문 내용을 확인하고 결제 방법을 선택해 주세요.</p></div>
    <span class="pay-security"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>안전한 결제</span>
  </div>

  <div id="loading">결제 정보를 불러오는 중…</div>

  <!-- 결제 위젯 영역 -->
  <div id="step-payment" class="pay-body" hidden>
    <div class="order-summary">
      <h2>주문 내역</h2>
      <div class="order-row"><span class="order-label">상품명</span><span id="info-name">-</span></div>
      <div class="order-row"><span class="order-label">주문자</span><span id="info-customer">-</span></div>
      <div class="order-row"><span class="order-label">결제 금액</span><strong id="info-amount">-</strong></div>
    </div>
    <div class="payment-section-title"><h2>결제 방법</h2><small>원하는 방법을 선택해 주세요</small></div>
    <div id="payment-method"></div>
    <div id="agreement"></div>
    <button id="pay-btn" disabled>결제하기</button>
  </div>

  <!-- 결제 완료 -->
  <div id="step-success" class="result-box success" hidden>
    <div class="result-icon">✅</div>
    <h2>결제 완료!</h2>
    <p>주문해 주셔서 감사합니다.<br />따뜻한 떡집에서 정성껏 준비하겠습니다.</p>
  </div>

  <!-- 결제 실패 -->
  <div id="step-fail" class="result-box fail" hidden>
    <div class="result-icon">❌</div>
    <h2>결제 실패</h2>
    <p id="fail-message">결제에 실패했습니다. 다시 시도해 주세요.</p>
    <button id="retry-btn" class="retry-btn" type="button">다시 시도</button>
  </div>
</div>

<script src="cart-utils.js"></script><script src="js/ui.js"></script>
<script>
  const API_BASE = window.location.protocol === "file:"
    ? "http://localhost:3001/api"
    : `${window.location.origin}/api`;
  const params = new URLSearchParams(location.search);
  const orderId = params.get("orderId");
  const step = params.get("step");
  const linkToken = params.get("token");
  const cacheKey = `tteok-payment-session:${orderId || "unknown"}`;

  function readSession() {
    try { return JSON.parse(sessionStorage.getItem(cacheKey) || "null"); } catch { return null; }
  }

  function saveSession(value) { sessionStorage.setItem(cacheKey, JSON.stringify(value)); }

  function show(id) {
    ["loading", "step-payment", "step-success", "step-fail"].forEach((s) => {
      const el = document.getElementById(s);
      if (el) el.hidden = s !== id;
    });
  }

  function formatWon(n) {
    return Number(n).toLocaleString("ko-KR") + "원";
  }

  async function init() {
    if (!orderId) {
      show("step-fail");
      document.getElementById("fail-message").textContent = "잘못된 결제 링크입니다.";
      return;
    }

    // 결제 완료 리다이렉트 처리
    if (step === "success") {
      await handleSuccess();
      return;
    }
    if (step === "fail") {
      show("step-fail");
      const errorCode = params.get("code");
      const errorMessage = params.get("message") || "결제에 실패했습니다. 다시 시도해 주세요.";
      document.getElementById("fail-message").textContent = `${errorMessage}${errorCode ? ` (${errorCode})` : ""}`;
      return;
    }

    // 결제 정보 + 클라이언트 키 병렬 로드
    let cached = readSession();
    const [infoRes, configRes] = await Promise.all([
      cached ? Promise.resolve(null) : fetch(`${API_BASE}/payments/info/${encodeURIComponent(orderId)}?token=${encodeURIComponent(linkToken || "")}`).catch(() => null),
      fetch(`${API_BASE}/payments/config`).catch(() => null),
    ]);

    if (!cached && (!infoRes || !infoRes.ok)) {
      show("step-fail");
      document.getElementById("fail-message").textContent = "결제 정보를 찾을 수 없습니다.";
      return;
    }

    if (!cached) {
      const info = await infoRes.json();
      cached = { info, sessionToken: info.sessionToken };
      saveSession(cached);
    }
    const info = cached.info;
    const config = configRes ? await configRes.json() : {};

    if (info.status === "DONE") {
      show("step-success");
      return;
    }

    if (!config.clientKey) {
      show("step-fail");
      document.getElementById("fail-message").textContent = "결제 서비스가 아직 설정되지 않았습니다.";
      return;
    }

    // 주문 정보 표시
    document.getElementById("info-name").textContent = info.orderName || "따뜻한 떡집 주문";
    document.getElementById("info-customer").textContent = info.customerName || "-";
    document.getElementById("info-amount").textContent = formatWon(info.amount);

    show("step-payment");
    await initWidget(config.clientKey, info);
  }

  async function initWidget(clientKey, info) {
    if (typeof TossPayments !== "function") throw new Error("결제 모듈을 불러오지 못했습니다. 네트워크 상태를 확인해 주세요.");
    await initDirectPayment(clientKey, info);
  }

  async function initDirectPayment(clientKey, info) {
    const tossPayments = TossPayments(clientKey);
    const customerKeyStorage = `tteok-payment-customer:${orderId}`;
    let customerKey = sessionStorage.getItem(customerKeyStorage);
    if (!customerKey) {
      customerKey = crypto.randomUUID ? crypto.randomUUID() : `guest-${Date.now()}-${Math.random().toString(36).slice(2, 12)}`;
      sessionStorage.setItem(customerKeyStorage, customerKey);
    }
    const payment = tossPayments.payment({ customerKey });
    const methodRoot = document.getElementById("payment-method");
    const preferred = info.paymentMethod === "transfer" ? "TRANSFER" : info.paymentMethod === "mobile" ? "MOBILE_PHONE" : "CARD";
    const methods = [
      ["CARD", "카드·간편결제"],
      ["TRANSFER", "계좌이체"],
      ["MOBILE_PHONE", "휴대폰 결제"],
    ];
    methodRoot.innerHTML = `<div class="direct-methods">${methods.map(([value, label]) => `<label><input type="radio" name="directPaymentMethod" value="${value}" ${value === preferred ? "checked" : ""}><span>${label}</span></label>`).join("")}</div><div class="payment-guide" data-payment-guide></div>`;
    const paymentGuide = methodRoot.querySelector("[data-payment-guide]");
    const updatePaymentGuide = () => {
      const selected = methodRoot.querySelector('input[name="directPaymentMethod"]:checked')?.value || "CARD";
      if (selected === "CARD") {
        paymentGuide.innerHTML = `<strong>카드와 간편결제를 함께 지원합니다</strong><p>결제하기를 누른 뒤 토스 결제창에서 일반 카드 또는 원하는 간편결제를 선택해 주세요.</p><div class="payment-easy-list" aria-label="지원 간편결제"><span class="is-kakao">카카오페이</span><span class="is-naver">네이버페이</span><span class="is-samsung">삼성페이</span><span class="is-payco">PAYCO</span><span class="is-ssg">SSG PAY</span><span>토스페이</span></div><small class="payment-guide-note">간편결제 노출 여부는 상점 계약 및 접속 기기 환경에 따라 달라질 수 있습니다.</small>`;
      } else if (selected === "TRANSFER") {
        paymentGuide.innerHTML = `<strong>실시간 계좌이체</strong><p>결제창에서 이용할 은행을 선택하고 계좌 인증을 진행합니다.</p>`;
      } else {
        paymentGuide.innerHTML = `<strong>휴대폰 결제</strong><p>통신사와 휴대폰 번호를 확인한 뒤 본인 인증을 진행합니다.</p>`;
      }
    };
    methodRoot.addEventListener("change", updatePaymentGuide);
    updatePaymentGuide();
    document.getElementById("agreement").hidden = true;
    const payBtn = document.getElementById("pay-btn");
    payBtn.disabled = false;
    const baseUrl = location.href.split("?")[0];
    payBtn.addEventListener("click", async () => {
      const selected = methodRoot.querySelector('input[name="directPaymentMethod"]:checked')?.value || "CARD";
      payBtn.disabled = true;
      payBtn.textContent = "결제 진행 중…";
      try {
        const request = {
          method: selected,
          amount: { currency: "KRW", value: info.amount },
          orderId,
          orderName: info.orderName || "따뜻한 떡집 주문",
          customerName: info.customerName || undefined,
          successUrl: `${baseUrl}?step=success&orderId=${encodeURIComponent(orderId)}&token=${encodeURIComponent(linkToken || "")}`,
          failUrl: `${baseUrl}?step=fail&orderId=${encodeURIComponent(orderId)}&token=${encodeURIComponent(linkToken || "")}`,
        };
        await payment.requestPayment(request);
      } catch (error) {
        payBtn.disabled = false;
        payBtn.textContent = "결제하기";
        if (error.code !== "USER_CANCEL") AppUI.alert(`${error.message || "결제창을 열지 못했습니다."}${error.code ? ` (${error.code})` : ""}`);
      }
    });
  }

  async function handleSuccess() {
    const paymentKey = params.get("paymentKey");
    const amount = Number(params.get("amount"));
    const existingSession = readSession();

    if (existingSession?.completed) {
      show("step-success");
      return;
    }

    if (!paymentKey || !amount) {
      show("step-fail");
      document.getElementById("fail-message").textContent = "결제 확인에 필요한 정보가 없습니다.";
      return;
    }

    const cached = existingSession;
    if (!cached?.sessionToken) {
      show("step-fail");
      document.getElementById("fail-message").textContent = "결제 세션이 만료되었습니다. 새 결제 링크를 요청해 주세요.";
      return;
    }
    const res = await fetch(`${API_BASE}/payments/confirm`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Payment-Session": cached.sessionToken },
      body: JSON.stringify({ paymentKey, orderId, amount }),
    }).catch(() => null);

    if (res && res.ok) {
      const data = await res.json();
      if (data.ok) {
        const cart = CartUtils.parseCart(localStorage.getItem("tteokShoppingCart"));
        localStorage.setItem("tteokShoppingCart", CartUtils.serializeCart(CartUtils.removeItems(cart, data.productIds || [])));
        saveSession({ ...cached, completed: true });
        show("step-success");
        return;
      }
    }

    show("step-fail");
    document.getElementById("fail-message").textContent = "결제 승인 처리 중 오류가 발생했습니다.";
  }

  document.getElementById("retry-btn").addEventListener("click", () => {
    const baseUrl = location.href.split("?")[0];
    location.href = `${baseUrl}?orderId=${encodeURIComponent(orderId)}&token=${encodeURIComponent(linkToken || "")}`;
  });

  init().catch((err) => {
    console.error(err);
    show("step-fail");
    document.getElementById("fail-message").textContent = err?.message || "결제 화면을 준비하지 못했습니다.";
  });
</script>
</body>
</html>
